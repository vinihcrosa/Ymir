services:
  core:
    build:
      context: .
      dockerfile: docker/linux-x86_64/Dockerfile
      target: ci
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      target: runner
    ports:
      - "3000:3000"
    volumes:
      - ymir_db:/app/data
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      DB_PATH: "/app/data/ymir.db"

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  ymir_db:
